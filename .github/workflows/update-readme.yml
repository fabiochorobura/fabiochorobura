name: 🔄 Auto-update README

on:
  schedule:
    - cron: "0 6 * * *"   # Todos os dias às 06:00 UTC
  workflow_dispatch:       # Permite executar manualmente na aba Actions

permissions:
  contents: write          # Necessário para git push

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: pip install --quiet requests beautifulsoup4

      - name: 🚀 Executar script de atualização
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py

      - name: 💾 Commit e push do README atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update README [skip ci]"
          git push
